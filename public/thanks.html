<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="Thank you for contacting Fardin Hasan Mayen." />
    <meta http-equiv="refresh" content="8; url=/" />
    <title>Thank You | Fardin Hasan Mayen</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1a0e14;
        --panel: #3c1f26;
        --text: #f5e8e8;
        --accent: #b22234;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Arial, Helvetica, sans-serif;
        background: radial-gradient(circle at top, #3c1f26 0%, var(--bg) 65%);
        color: var(--text);
      }

      main {
        width: min(680px, 100%);
        padding: 40px 32px;
        border: 1px solid rgba(245, 232, 232, 0.15);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.28);
        text-align: center;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 5vw, 3.25rem);
      }

      p {
        margin: 0 auto 24px;
        font-size: 1.05rem;
        line-height: 1.7;
        max-width: 54ch;
        color: rgba(245, 232, 232, 0.9);
      }

      a {
        display: inline-block;
        padding: 14px 22px;
        border-radius: 999px;
        background: var(--accent);
        color: var(--text);
        text-decoration: none;
        font-weight: 700;
      }

      a:hover {
        filter: brightness(1.1);
      }

      .small {
        margin-top: 18px;
        font-size: 0.92rem;
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Thank you</h1>
      <p>Your message has been received. Fardin Hasan Mayen will review it and respond as soon as possible.</p>
      <a href="/">Back to Home</a>
      <div class="small">You will be redirected to the homepage shortly.</div>
    </main>
  </body>
</html>
